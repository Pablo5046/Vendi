<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Vendi con imágenes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#0f0f0f;color:white;}
header{background:#111;padding:15px;text-align:center;}
.container{padding:15px;max-width:900px;margin:auto;}
.card{background:#1c1c1c;padding:15px;border-radius:10px;margin:10px 0;}
input,button{width:100%;padding:10px;margin:5px 0;border:none;border-radius:6px;}
button{background:#25D366;color:white;cursor:pointer;}
.product{background:#2a2a2a;padding:10px;margin:10px 0;border-radius:10px;}
img{width:100%;border-radius:10px;margin-top:5px;}
.hidden{display:none;}
</style>
</head>

<body>

<header>
<h2>VENDI - Tienda con imágenes</h2>
</header>

<div class="container">

<!-- TIENDA -->
<div class="card" id="store">
<h3>Crear producto</h3>

<input id="name" placeholder="Nombre producto">
<input id="price" placeholder="Precio">

<input type="file" id="img" accept="image/*">

<button onclick="addProduct()">Agregar producto</button>

<h3>Productos</h3>
<div id="list"></div>
</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

// convertir imagen a base64
function toBase64(file){
return new Promise((res,rej)=>{
const reader = new FileReader();
reader.onload = ()=>res(reader.result);
reader.readAsDataURL(file);
});
}

async function addProduct(){

let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let file = document.getElementById("img").files[0];

let image = "";

if(file){
image = await toBase64(file);
}

products.push({name,price,image});
localStorage.setItem("products",JSON.stringify(products));

render();
}

function render(){

let html="";

products.forEach(p=>{
html+=`
<div class="product">
<h3>${p.name}</h3>
<p>L. ${p.price}</p>

${p.image ? `<img src="${p.image}">` : ""}

<a href="https://wa.me/50499999999?text=Quiero%20${p.name}">
Comprar por WhatsApp
</a>
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

render();

</script>

</body>
</html>
